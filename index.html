<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Arm Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f1623;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 { font-size: 22px; margin-bottom: 6px; }

        #status {
            font-size: 14px;
            margin-bottom: 30px;
            padding: 6px 14px;
            border-radius: 20px;
            background: #333;
        }
        #status.connected    { background: #2d6a4f; }
        #status.disconnected { background: #c1121f; }

        .btn {
            width: 240px;
            padding: 22px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 18px;
            color: white;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-a { background: #e63946; }
        .btn-b { background: #457b9d; }
    </style>
</head>
<body>

    <h1>🦾 Robot Arm Control</h1>
    <div id="status" class="disconnected">Connecting...</div>

    <button class="btn btn-a" id="btnA" onclick="send('A')" disabled>Button A</button>
    <button class="btn btn-b" id="btnB" onclick="send('B')" disabled>Button B</button>

    <script>
        const BROKER = "wss://broker.hivemq.com:8884/mqtt";
        const TOPIC  = "dimos/robot/press";

        const statusEl = document.getElementById("status");
        const btnA = document.getElementById("btnA");
        const btnB = document.getElementById("btnB");

        const client = mqtt.connect(BROKER, { reconnectPeriod: 3000 });

        client.on("connect", () => {
            statusEl.textContent = "Connected";
            statusEl.className   = "connected";
            btnA.disabled = false;
            btnB.disabled = false;
        });

        client.on("offline", () => {
            statusEl.textContent = "Disconnected";
            statusEl.className   = "disconnected";
            btnA.disabled = true;
            btnB.disabled = true;
        });

        function send(cmd) {
            if (client.connected) {
                client.publish(TOPIC, cmd);
            }
        }
    </script>

</body>
</html>
