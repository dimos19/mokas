<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Arm Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg:        #0a0e17;
            --panel:     #0f1623;
            --border:    #1e2d45;
            --accent:    #00e5ff;
            --red:       #ff3b5c;
            --blue:      #2979ff;
            --green:     #00e676;
            --text:      #cdd9e5;
            --dim:       #4a5568;
            --font-mono: 'Share Tech Mono', monospace;
            --font-ui:   'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(41,121,255,0.06) 0%, transparent 60%);
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 420px;
            margin-bottom: 28px;
            text-align: center;
        }

        .logo {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            line-height: 1.1;
        }

        h1 span { color: var(--accent); }

        /* ── Status bar ── */
        .status-bar {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--dim);
            flex-shrink: 0;
            transition: background 0.4s, box-shadow 0.4s;
        }

        .dot.on {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }

        .dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        #status-text { color: var(--text); flex: 1; }

        /* ── Control panel ── */
        .panel {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 18px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-family: var(--font-ui);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:last-child { margin-bottom: 0; }

        .btn:active { transform: scale(0.97); }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        .btn-a {
            background: rgba(255,59,92,0.12);
            border-color: rgba(255,59,92,0.4);
            color: #ff3b5c;
        }
        .btn-a:hover:not(:disabled) {
            background: rgba(255,59,92,0.22);
            box-shadow: 0 0 20px rgba(255,59,92,0.25);
        }

        .btn-b {
            background: rgba(41,121,255,0.12);
            border-color: rgba(41,121,255,0.4);
            color: #5b9bff;
        }
        .btn-b:hover:not(:disabled) {
            background: rgba(41,121,255,0.22);
            box-shadow: 0 0 20px rgba(41,121,255,0.25);
        }

        .btn-ab {
            background: rgba(0,230,118,0.10);
            border-color: rgba(0,230,118,0.35);
            color: var(--green);
        }
        .btn-ab:hover:not(:disabled) {
            background: rgba(0,230,118,0.18);
            box-shadow: 0 0 20px rgba(0,230,118,0.2);
        }

        .btn-icon { font-size: 20px; }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 18px 0;
        }

        /* ── Activity log ── */
        .log-panel {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .log-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        #log {
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.8;
            height: 110px;
            overflow-y: auto;
            color: var(--dim);
        }

        #log .entry { display: flex; gap: 8px; }
        #log .entry .time { color: var(--accent); opacity: 0.5; flex-shrink: 0; }
        #log .entry.ok   .msg { color: var(--green); }
        #log .entry.err  .msg { color: var(--red); }
        #log .entry.info .msg { color: var(--text); }
        #log .entry.cmd  .msg { color: #ffd740; }

        /* ── Flash feedback ── */
        .flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .flash.show { opacity: 1; }

        /* scrollbar */
        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-track { background: transparent; }
        #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<div class="flash" id="flash"></div>

<header>
    <div class="logo">ESP32 · MQTT · HiveMQ</div>
    <h1>Robot <span>Arm</span> Control</h1>
</header>

<!-- Status -->
<div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text" font-family="var(--font-mono)">Connecting to broker...</span>
</div>

<!-- Buttons -->
<div class="panel">
    <div class="panel-title">// Command Panel</div>

    <button class="btn btn-a" id="btnA" onclick="send('A')" disabled>
        <span class="btn-icon">⬤</span> Press Button A
    </button>

    <button class="btn btn-b" id="btnB" onclick="send('B')" disabled>
        <span class="btn-icon">⬤</span> Press Button B
    </button>

    <hr class="divider">

    <button class="btn btn-ab" id="btnAB" onclick="send('AB')" disabled>
        <span class="btn-icon">▶▶</span> Press A → then B
    </button>
</div>

<!-- Log -->
<div class="log-panel">
    <div class="log-title">// Activity Log</div>
    <div id="log"></div>
</div>

<script>
    const BROKER = "wss://broker.hivemq.com:8884/mqtt";
    const TOPIC  = "dimos/robot/press";

    const dot        = document.getElementById("dot");
    const statusText = document.getElementById("status-text");
    const logEl      = document.getElementById("log");
    const flash      = document.getElementById("flash");
    const buttons    = [
        document.getElementById("btnA"),
        document.getElementById("btnB"),
        document.getElementById("btnAB")
    ];

    function addLog(msg, type = "info") {
        const t   = new Date().toLocaleTimeString("en-GB", { hour12: false });
        const div = document.createElement("div");
        div.className = `entry ${type}`;
        div.innerHTML = `<span class="time">${t}</span><span class="msg">${msg}</span>`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function flashScreen(color) {
        flash.style.background = color;
        flash.classList.add("show");
        setTimeout(() => flash.classList.remove("show"), 120);
    }

    function setConnected(ok) {
        dot.className        = "dot " + (ok ? "on" : "err");
        statusText.textContent = ok
            ? "Connected — broker.hivemq.com"
            : "Disconnected — retrying...";
        buttons.forEach(b => b.disabled = !ok);
    }

    // MQTT
    const client = mqtt.connect(BROKER, {
        clientId: "web_" + Math.random().toString(16).slice(2, 8),
        clean: true,
        reconnectPeriod: 3000
    });

    client.on("connect", () => {
        setConnected(true);
        addLog("Connected to HiveMQ broker", "ok");
    });

    client.on("offline",      () => { setConnected(false); addLog("Connection lost", "err"); });
    client.on("reconnect",    () => addLog("Reconnecting...", "info"));
    client.on("error", (err)  => addLog("Error: " + err.message, "err"));

    function send(cmd) {
        if (!client.connected) { addLog("Not connected!", "err"); return; }

        const labels = { A: "Button A", B: "Button B", AB: "Button A → B" };
        client.publish(TOPIC, cmd);
        addLog(`Command sent → ${labels[cmd]}`, "cmd");

        const colors = { A: "rgba(255,59,92,0.15)", B: "rgba(41,121,255,0.15)", AB: "rgba(0,230,118,0.12)" };
        flashScreen(colors[cmd]);
    }
</script>
</body>
</html>
